<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F9FAFB">
  <title>Catchtime</title>

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Estilos (v= cache-busting: evita assets obsoletos con live-server/iCloud) -->
  <link rel="stylesheet" href="css/styles.css?v=15">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.css">
</head>
<body>
  <!-- punto de montaje: app.js inyecta aquí la pantalla -->
  <div id="app"></div>

  <!-- Bloqueo de zoom móvil (iOS ignora user-scalable=no, así que lo forzamos) -->
  <script>
    // pinch-zoom (gestos de Safari iOS)
    ['gesturestart', 'gesturechange', 'gestureend'].forEach(ev =>
      document.addEventListener(ev, e => e.preventDefault(), { passive: false })
    );
    // doble-tap para hacer zoom
    let lastTouch = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTouch <= 300) e.preventDefault();
      lastTouch = now;
    }, { passive: false });
  </script>

  <!-- Scripts en orden de dependencia -->
  <script src="js/data.js?v=14"></script>
  <script src="js/icons.js?v=14"></script>
  <script src="js/components.js?v=15"></script>
  <script src="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.js"></script>
  <script src="js/app.js?v=15"></script>
</body>
</html>
